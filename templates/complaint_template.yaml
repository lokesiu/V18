template_name: 投诉举报书
description: 用于向行政机关投诉举报的文书模板
version: "2.0"

sections:
  - title: "投诉举报书"
    content: |
      投诉人信息：
      {{parties}}

      案件编号：{{case_id}}

      投诉事项：
      本投诉涉及以下事项，请求主管部门依法查处。

      事实与理由：
      {{key_facts}}

      证据清单：
      {{source_refs}}

      投诉请求：
      1. 依法查处被投诉人的违法行为；
      2. 维护投诉人的合法权益；
      3. 根据实际情况赔偿相关损失。

      法律依据：
      依据相关法律法规，特此投诉。

      综合评级：{{sabcd_rating}}

      行动建议：
      {{action_advice}}

      风险提示：
      {{risk_warnings}}

      此致

      投诉人签名：_______________
      日期：_______________

metadata:
  version: "2.0"
  author: "明证台V18系统"
